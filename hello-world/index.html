<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #fdfbfb 0%, #ebedee 50%, #dde1e7 100%);
      color: #1f2933;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow:
        0 18px 45px rgba(15, 23, 42, 0.12),
        0 0 0 1px rgba(148, 163, 184, 0.15);
      padding: 26px 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    h1 {
      font-size: 24px;
      font-weight: 650;
      letter-spacing: 0.02em;
      color: #111827;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.07);
      color: #1d4ed8;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid rgba(59, 130, 246, 0.18);
      white-space: nowrap;
    }

    .card {
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 50%, #eef2ff 100%);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9ca3af;
      font-weight: 600;
    }

    .time-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .time-display {
      flex: 1 1 160px;
      min-height: 24px;
      padding: 7px 10px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.03);
      border: 1px dashed rgba(156, 163, 175, 0.8);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      color: #111827;
      display: flex;
      align-items: center;
    }

    .time-placeholder {
      color: #9ca3af;
    }

    .button-primary {
      appearance: none;
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #ffffff;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      box-shadow:
        0 10px 18px rgba(37, 99, 235, 0.30),
        0 0 0 1px rgba(255, 255, 255, 0.35) inset;
      transition:
        transform 0.12s ease-out,
        box-shadow 0.12s ease-out,
        background 0.12s ease-out,
        filter 0.12s ease-out;
      white-space: nowrap;
    }

    .button-primary:hover {
      background: linear-gradient(135deg, #1d4ed8, #4338ca);
      box-shadow:
        0 14px 26px rgba(37, 99, 235, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.45) inset;
      transform: translateY(-1px);
      filter: saturate(1.07);
    }

    .button-primary:active {
      transform: translateY(0);
      box-shadow:
        0 6px 12px rgba(30, 64, 175, 0.32),
        0 0 0 1px rgba(255, 255, 255, 0.25) inset;
    }

    .button-icon {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(239, 246, 255, 0.18);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      font-size: 11px;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .app-shell {
        padding: 20px 18px 18px;
        border-radius: 16px;
      }

      h1 {
        font-size: 21px;
      }

      .time-row {
        align-items: stretch;
      }

      .button-primary {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="title-group">
        <h1>Hello World</h1>
        <p class="subtitle">一个展示当前时间的小工具</p>
      </div>
      <span class="badge">Time Demo</span>
    </header>

    <section class="card">
      <div class="card-label">当前时间</div>
      <div class="time-row">
        <div id="time" class="time-display">
          <span class="time-placeholder">点击右侧按钮获取当前时间</span>
        </div>
        <button class="button-primary" onclick="showTime()">
          <span class="button-icon">⏱</span>
          <span>显示时间</span>
        </button>
      </div>
    </section>

    <footer class="footer">
      <span>基于原生 HTML + JavaScript</span>
    </footer>
  </div>

  <script>
    function showTime() {
      var now = new Date();
      var formatted = now.getFullYear() + '-' +
        String(now.getMonth() + 1).padStart(2, '0') + '-' +
        String(now.getDate()).padStart(2, '0') + ' ' +
        String(now.getHours()).padStart(2, '0') + ':' +
        String(now.getMinutes()).padStart(2, '0') + ':' +
        String(now.getSeconds()).padStart(2, '0');

      var timeEl = document.getElementById('time');
      timeEl.textContent = formatted;
    }
  </script>
</body>
</html>
