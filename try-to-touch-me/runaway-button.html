<body>
  <div class="btn-glow" id="btn-glow"></div>
  <button class="runaway-btn" id="runaway">点我</button>

  <script>
    (function () {
      const SAFE_RADIUS = 140; // 鼠标靠近到这个范围就开始逃
      const EXTRA_DIST = 90;   // 额外多跑一点，保证跟不上
      const BUTTON_SIZE = 120;
      const HALF_SIZE = BUTTON_SIZE / 2;

      const btn = document.getElementById('runaway');
      const btnGlow = document.getElementById('btn-glow');
      let isGameOver = false;

      let currentX = window.innerWidth / 2;
      let currentY = window.innerHeight / 2;
      let targetX = currentX;
      let targetY = currentY;

      function applyPosition() {
        btn.style.left = currentX + 'px';
        btn.style.top = currentY + 'px';
        btn.style.transform = 'translate(-50%, -50%)';
        btnGlow.style.left = currentX + 'px';
        btnGlow.style.top = currentY + 'px';
        btnGlow.style.transform = 'translate(-50%, -50%)';
      }
      applyPosition();

      function clampToViewport(x, y) {
        const minX = HALF_SIZE;
        const maxX = window.innerWidth - HALF_SIZE;
        const minY = HALF_SIZE;
        const maxY = window.innerHeight - HALF_SIZE;
        return {
          x: Math.min(maxX, Math.max(minX, x)),
          y: Math.min(maxY, Math.max(minY, y))
        };
      }

      function animate() {
        if (isGameOver) {
          return;
        }
        const lerpFactor = 0.18;
        currentX += (targetX - currentX) * lerpFactor;
        currentY += (targetY - currentY) * lerpFactor;
        applyPosition();
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);

      document.addEventListener('mousemove', (e) => {
        if (isGameOver) return;
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        const dx = currentX - mouseX;
        const dy = currentY - mouseY;
        const dist = Math.hypot(dx, dy) || 0.001;

        if (dist >= SAFE_RADIUS) {
          return; // 太远了，不用逃
        }

        // 逃跑的基础步长：越靠近跑得越远
        const baseStep = SAFE_RADIUS - dist + EXTRA_DIST;

        // 归一化的“远离鼠标”的方向
        const vx = dx / dist;
        const vy = dy / dist;

        const candidates = [];

        function pushCandidate(nx, ny) {
          const c = clampToViewport(nx, ny);
          const ddx = c.x - mouseX;
          const ddy = c.y - mouseY;
          const score = ddx * ddx + ddy * ddy; // 离鼠标越远分越高
          candidates.push({ x: c.x, y: c.y, score });
        }

        // 1. 直接沿着“远离鼠标”的反方向逃跑
        pushCandidate(currentX + vx * baseStep, currentY + vy * baseStep);

        // 2. 在边缘被卡住时，沿着边界“绕圈”逃跑（两个切向方向）
        pushCandidate(currentX - vy * baseStep, currentY + vx * baseStep);
        pushCandidate(currentX + vy * baseStep, currentY - vx * baseStep);

        // 选一个最终离鼠标最远的目标点
        let best = candidates[0];
        for (let i = 1; i < candidates.length; i++) {
          if (candidates[i].score > best.score) best = candidates[i];
        }

        targetX = best.x;
        targetY = best.y;
      });

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (isGameOver) return;

        isGameOver = true;

        // 隐藏按钮与光晕
        btn.style.display = 'none';
        btnGlow.style.display = 'none';

        // 创建居中文字容器
        const msg = document.createElement('div');
        msg.className = 'center-message';
        msg.textContent = '好吧，你赢了。这个网页即将自毁...';
        document.body.appendChild(msg);

        // 1 秒后开始背景渐白 + 文案淡出（各 3 秒）
        setTimeout(() => {
          document.body.style.backgroundColor = '#ffffff';
          msg.style.opacity = '0';

          // 2 秒后瞬间显示 404，无淡入（比过渡早 1 秒）
          setTimeout(() => {
            msg.remove();
            const page404 = document.createElement('div');
            page404.className = 'page-404';
            const line1 = document.createElement('div');
            line1.textContent = '404';
            const line2 = document.createElement('div');
            line2.className = 'sub';
            line2.textContent = 'not found';
            page404.appendChild(line1);
            page404.appendChild(line2);
            document.body.appendChild(page404);
          }, 2000);
        }, 1000);
      });

      window.addEventListener('resize', () => {
        const c1 = clampToViewport(currentX, currentY);
        currentX = c1.x;
        currentY = c1.y;
        const c2 = clampToViewport(targetX, targetY);
        targetX = c2.x;
        targetY = c2.y;
        applyPosition();
      });
    })();
  </script>
</body>
